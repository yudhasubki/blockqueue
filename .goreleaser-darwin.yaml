# yaml-language-server: $schema=https://raw.githubusercontent.com/goreleaser/goreleaser/v2.17.0/www/docs/static/schema.json
version: 2

builds:
  - id: blockqueue-darwin-amd64
    main: ./cmd/blockqueue
    binary: blockqueue
    env:
      - CGO_ENABLED=1
    flags: [-trimpath]
    goos: [darwin]
    goarch: [amd64]
  - id: blockqueue-darwin-arm64
    main: ./cmd/blockqueue
    binary: blockqueue
    env:
      - CGO_ENABLED=1
    flags: [-trimpath]
    goos: [darwin]
    goarch: [arm64]

archives:
  - id: blockqueue-darwin
    ids:
      - blockqueue-darwin-amd64
      - blockqueue-darwin-arm64
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - config.yaml.example

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_darwin_checksums.txt"

source:
  enabled: false

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  mode: keep-existing

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
