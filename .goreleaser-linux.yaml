# yaml-language-server: $schema=https://raw.githubusercontent.com/goreleaser/goreleaser/v2.17.0/www/docs/static/schema.json
version: 2

builds:
  - id: blockqueue-linux-amd64
    main: ./cmd/blockqueue
    binary: blockqueue
    env:
      - CGO_ENABLED=1
      - CC=gcc
    flags: [-trimpath]
    goos: [linux]
    goarch: [amd64]
  - id: blockqueue-linux-arm64
    main: ./cmd/blockqueue
    binary: blockqueue
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    flags: [-trimpath]
    goos: [linux]
    goarch: [arm64]
  - id: blockqueue-linux-armv7
    main: ./cmd/blockqueue
    binary: blockqueue
    env:
      - CGO_ENABLED=1
      - CC=arm-linux-gnueabihf-gcc
    flags: [-trimpath]
    goos: [linux]
    goarch: [arm]
    goarm: [7]

archives:
  - id: blockqueue-linux
    ids:
      - blockqueue-linux-amd64
      - blockqueue-linux-arm64
      - blockqueue-linux-armv7
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
    files:
      - README.md
      - LICENSE
      - NOTICE
      - CHANGELOG.md
      - config.yaml.example

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_linux_checksums.txt"

source:
  enabled: false

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  mode: keep-existing

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
